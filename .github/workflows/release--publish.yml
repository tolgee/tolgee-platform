name: Build and Publish Release

on:
  workflow_call:
    inputs:
      use-machine-pat:
        description: Whether to use TOLGEE_MACHINE_PAT for checkout and release (vs default token)
        required: false
        type: boolean
        default: false
      docker-publish-method:
        description: "'gradle' for dockerPublish task, 'manual' for direct buildx build"
        required: true
        type: string
      deploy-testing:
        description: Whether to deploy to testing environment
        required: false
        type: boolean
        default: false
      trigger-billing:
        description: Whether to trigger billing repo tests
        required: false
        type: boolean
        default: false
      tag-keys:
        description: Whether to tag production keys in Tolgee platform
        required: false
        type: boolean
        default: false

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ inputs.use-machine-pat && secrets.TOLGEE_MACHINE_PAT || github.token }}

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: adopt

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install node modules
        run: npm ci

      - name: Run get new version
        run: npm run release-dry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: Tolgee Machine
          GIT_COMMITTER_NAME: Tolgee Machine
          GIT_AUTHOR_EMAIL: machine@tolgee.io
          GIT_COMMITTER_EMAIL: machine@tolgee.io

      - name: Set version property
        id: version
        run: echo "VERSION=$(test -e .VERSION && echo v$(cat .VERSION))" >> $GITHUB_OUTPUT

      - name: BootJar with version
        if: steps.version.outputs.VERSION != ''
        run: ./gradlew bootJar
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}

      - name: Login to docker
        if: steps.version.outputs.VERSION != ''
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p "${{ secrets.DOCKERHUB_PASSWORD }}"

      # Gradle dockerPublish method (release)
      - name: Create docker image (gradle)
        if: steps.version.outputs.VERSION != '' && inputs.docker-publish-method == 'gradle'
        run: |
          docker buildx create --use
          ./gradlew dockerPublish
          VERSION=latest ./gradlew dockerPublish
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}
          DOCKER_CACHE_FROM: type=registry,ref=tolgee/tolgee:latest
          DOCKER_CACHE_TO: type=inline

      # Manual buildx method (prerelease)
      - name: Prepare for docker build
        if: steps.version.outputs.VERSION != '' && inputs.docker-publish-method == 'manual'
        run: ./gradlew dockerPrepare
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}

      - name: Create docker image (manual)
        if: steps.version.outputs.VERSION != '' && inputs.docker-publish-method == 'manual'
        run: |
          docker buildx create --use
          docker buildx build . -t tolgee/tolgee:${{ steps.version.outputs.VERSION }} --platform linux/arm64,linux/amd64 --push
        working-directory: build/docker

      - name: Pack with webapp
        if: steps.version.outputs.VERSION != ''
        run: ./gradlew packResources
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
          TOLGEE_API_URL: ${{ secrets.TOLGEE_API_URL }}

      - name: Run npm release
        if: steps.version.outputs.VERSION != ''
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ inputs.use-machine-pat && secrets.TOLGEE_MACHINE_PAT || secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          GIT_AUTHOR_NAME: Tolgee Machine
          GIT_COMMITTER_NAME: Tolgee Machine
          GIT_AUTHOR_EMAIL: machine@tolgee.io
          GIT_COMMITTER_EMAIL: machine@tolgee.io

      - name: Tag production and deprecated keys in platform
        if: steps.version.outputs.VERSION != '' && inputs.tag-keys
        run: npm run tag-keys
        working-directory: ./webapp
        env:
          TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}

      - name: Deploy testing
        if: steps.version.outputs.VERSION != '' && inputs.deploy-testing
        run: |
          mkdir -p ~/.kube
          echo $KUBERNETES_DO_SERVICE_CONFIG | base64 -d > ~/.kube/config
          kubectl exec $(kubectl get pods -l app=testing-migrator -o jsonpath={.items\[0\].metadata.name}) -- /bin/bash -c "MIGRATE_TARGET_IMAGE=tolgee/tolgee:${{ steps.version.outputs.VERSION }} /migrate.sh"
        env:
          KUBERNETES_DO_SERVICE_CONFIG: ${{ secrets.KUBERNETES_DO_SERVICE_CONFIG }}

      - name: Trigger Billing repo tests & testing deploy
        if: steps.version.outputs.VERSION != '' && inputs.trigger-billing
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.TOLGEE_MACHINE_PAT }}" \
            https://api.github.com/repos/tolgee/billing/actions/workflows/test.yml/dispatches \
            -d '{"ref":"main","inputs":{"release-version":"${{ steps.version.outputs.VERSION }}"}}'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test
          path: |
            ./e2e/cypress/videos/**/*
            ./e2e/cypress/screenshots/**/*
            ./build/reports/**/*
