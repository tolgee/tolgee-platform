name: Backend Checks

on:
  workflow_call:
    inputs:
      event-name:
        required: true
        type: string

jobs:
  schema-check:
    name: Schema Check 📋
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check source cache
        id: source-cache
        uses: ./.github/actions/check-source-cache
        with:
          cache-key-prefix: test-passed-schema-check
          event-name: ${{ inputs.event-name }}

      - name: Setup environment
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-env

      - name: Download backend build result
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/download-backend-build

      - name: Install webapp dependencies
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./webapp

      - name: Start backend
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          ./gradlew server-app:bootRun --args='--spring.profiles.active=dev' &
          echo "Waiting for backend to start..."
          timeout 180 bash -c 'until curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; do sleep 2; done'
          echo "Backend is ready"
        env:
          SKIP_SERVER_BUILD: true

      - name: Generate schema
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: npm run schema
        working-directory: ./webapp
        env:
          VITE_APP_API_URL: http://localhost:8080

      - name: Check for uncommitted schema changes
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Schema files have changed! Please run 'npm run schema' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "✅ Schema files are up to date"

      - name: Save source cache
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-source-cache
        with:
          cache-key: ${{ steps.source-cache.outputs.cache-key }}

  migration-check:
    name: Migration Check 🗃️
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check source cache
        id: source-cache
        uses: ./.github/actions/check-source-cache
        with:
          cache-key-prefix: test-passed-migration-check
          extra-ignores: ":!webapp/ :!e2e/ :!library/ :!package.json :!package-lock.json"
          event-name: ${{ inputs.event-name }}

      - name: Setup environment
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-env
        with:
          node: "false"

      - name: Download backend build result
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/download-backend-build

      - name: Generate migration diff
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: ./gradlew diffChangeLog
        env:
          SKIP_SERVER_BUILD: true

      - name: Check for uncommitted migration changes
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Migration files are out of date! Please run './gradlew diffChangeLog' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "✅ Migration files are up to date"

      - name: Save source cache
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/save-source-cache
        with:
          cache-key: ${{ steps.source-cache.outputs.cache-key }}
