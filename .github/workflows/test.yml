name: Test

on:
  workflow_dispatch:
  push:
    branches: [main, release]
  pull_request:

jobs:
  backend-build:
    uses: ./.github/workflows/test--build-backend.yml

  frontend-build:
    uses: ./.github/workflows/test--build-frontend.yml
    secrets: inherit

  e2e-install-deps:
    uses: ./.github/workflows/test--e2e-install-deps.yml

  backend-tests:
    needs: [backend-build]
    uses: ./.github/workflows/test--backend-tests.yml
    secrets: inherit
    with:
      event-name: ${{ github.event_name }}
      run-reporters: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

  e2e-tests:
    needs: [frontend-build, backend-build, e2e-install-deps]
    uses: ./.github/workflows/test--e2e-tests.yml
    secrets: inherit
    with:
      event-name: ${{ github.event_name }}

  frontend-and-static-checks:
    uses: ./.github/workflows/test--frontend-and-static-checks.yml
    secrets: inherit
    with:
      event-name: ${{ github.event_name }}

  backend-checks:
    needs: [backend-build]
    uses: ./.github/workflows/test--backend-checks.yml
    secrets: inherit
    with:
      event-name: ${{ github.event_name }}

  everything-passed:
    name: Everything passed 🎉
    # List all top-level jobs so this runs last. The actual check uses the API
    # to verify ALL jobs in the run, so forgetting an entry here is caught.
    needs:
      - backend-build
      - backend-tests
      - frontend-build
      - frontend-and-static-checks
      - backend-checks
      - e2e-tests
      - e2e-install-deps
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs" \
            --paginate --jq '.jobs[] | select(.name != "Everything passed 🎉" and .conclusion != "success" and .conclusion != "skipped") | .name')
          if [ -n "$failed" ]; then
            echo "The following jobs failed:"
            echo "$failed"
            exit 1
          fi
          echo "Everything passed 🎉"
